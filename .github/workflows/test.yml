name: Test Build

on:
  pull_request:

jobs:
  matrix-builder:
    runs-on: ubuntu-24.04
    outputs:
      includes: ${{ steps.builder.outputs.includes }}
    steps:
      - name: Environment Setup
        run: |
          if ! command -v sudo 2>&1 >/dev/null; then
            apt update
            DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends sudo
          fi

      - name: Build Matrix
        id: builder
        uses: regolith-linux/actions/build-matrix@enhance-build-matrix
        with:
          name: "${{ github.event.repository.name }}"
          ref: "${{ github.base_ref }}"
          stage: "unstable"

  build:
    runs-on: ubuntu-24.04
    container: "${{ matrix.distro }}:${{ matrix.codename }}"
    needs: matrix-builder
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix-builder.outputs.includes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          if ! command -v sudo 2>&1 >/dev/null; then
            apt update
            DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends sudo
          fi
  
      - name: Build Package
        uses: regolith-linux/actions/build-package@enhance-build-matrix
        with:
          name: "${{ github.event.repository.name }}"
          distro: "${{ matrix.distro }}"
          codename: "${{ matrix.codename }}"
          stage: "unstable"
          suite: "unstable"
          component: "main"
          arch: "amd64"
          gpg-key: "${{ secrets.PACKAGE_PRIVATE_KEY2 }}"
