name: Test Build

on:
  pull_request:

jobs:
  matrix-builder:
    runs-on: ubuntu-24.04
    outputs:
      includes: ${{ steps.builder.outputs.includes }}
    steps:
      - name: Build Matrix
        id: builder
        uses: regolith-linux/actions/build-matrix@enhance-build-matrix
        with:
          name: "${{ github.event.repository.name }}"
          ref: "${{ github.base_ref }}"
          arch: "amd64 arm64"
          stage: "unstable"

